name: Update ScienceSilenced Content

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic feedparser

      - name: Run pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Commit updated content
        run: |
          git config user.name "ScienceSilenced Bot"
          git config user.email "info@sciencesilenced.com"
          git add news.json podcasts.json
          git diff --staged --quiet || git commit -m "Content update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
